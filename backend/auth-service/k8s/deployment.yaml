apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: yashodaadarsh/my-k8s-cicd-app:latest  # your Docker Hub image
        imagePullPolicy: Always
        ports:
        - containerPort: 8080