apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: yashodaadarsh/auth-service:8
        imagePullPolicy: Always
        ports:
        - containerPort: 8080