apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: yashodaadarsh/notification-service:1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083

        envFrom:
        - secretRef:
            name: db-secret