apiVersion: apps/v1
kind: Deployment
metadata:
  name: gig-service-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gig-service
  template:
    metadata:
      labels:
        app: gig-service
    spec:
      containers:
      - name: gig-service
        image: yashodaadarsh/gig-service:2   # 🔥 update image after rebuild
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8082

        # ✅ FIXED ENV VARIABLES
        env:
        - name: ML_SERVICE_URL
          value: "http://ml-service:8080"

        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8080"

        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8080"

        envFrom:
        - secretRef:
            name: db-secret-gig